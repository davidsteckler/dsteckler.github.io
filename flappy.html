<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Flappy Fish</title>
  <style>
    :root{
      --bg0:#051b2e;
      --bg1:#07324d;
      --bg2:#0a5170;
      --ui:#c8f7ff;
      --ui2:#7ee7ff;
      --warn:#ffd36b;
      --good:#88ffb6;
      --bad:#ff6b6b;
      --shadow: rgba(0,0,0,0.35);
    }

    html, body {
      margin: 0;
      height: 100%;
      background: radial-gradient(circle at 50% 25%, var(--bg2), var(--bg0) 60%, #02101b 100%);
      color: var(--ui);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      image-rendering: pixelated;
      overflow: hidden;
    }

    .wrap{
      height: 100%;
      display: grid;
      place-items: center;
      padding: 14px;
      box-sizing: border-box;
    }

    .frame{
      width: min(980px, 96vw);
      display: grid;
      gap: 10px;
      justify-items: center;
    }

    .topbar{
      width: 100%;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .title{
      display: flex;
      gap: 10px;
      align-items: baseline;
      flex-wrap: wrap;
    }

    .title h1{
      margin: 0;
      font-size: 18px;
      letter-spacing: 1px;
      color: var(--ui);
      text-shadow: 0 2px 0 var(--shadow);
    }

    .title .tag{
      font-size: 12px;
      color: var(--ui2);
      opacity: 0.9;
    }

    .buttons{
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button{
      appearance: none;
      border: 2px solid rgba(200,247,255,0.4);
      background: rgba(6, 38, 58, 0.7);
      color: var(--ui);
      padding: 8px 10px;
      border-radius: 10px;
      font: inherit;
      font-size: 12px;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(0,0,0,0.22);
      transition: transform 0.05s ease;
      user-select: none;
    }

    button:active{ transform: translateY(1px); }

    .card{
      width: 100%;
      border-radius: 18px;
      border: 2px solid rgba(200,247,255,0.18);
      background: linear-gradient(180deg, rgba(7, 52, 77, 0.38), rgba(2, 16, 27, 0.35));
      box-shadow: 0 18px 36px rgba(0,0,0,0.25);
      padding: 12px;
      box-sizing: border-box;
    }

    .row{
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      align-items: start;
      justify-items: center;
    }

    canvas{
      width: 100%;
      height: auto;
      aspect-ratio: 16 / 9;
      max-height: 70vh;
      border-radius: 14px;
      background: transparent;
      border: 2px solid rgba(200,247,255,0.18);
      box-shadow: inset 0 0 0 2px rgba(0,0,0,0.18);
      touch-action: none;
    }

    .hud{
      width: 100%;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      margin-top: 10px;
    }

    .hint{
      font-size: 12px;
      color: rgba(200,247,255,0.85);
      line-height: 1.35;
    }

    .stats{
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
      font-size: 12px;
      color: rgba(200,247,255,0.92);
    }

    .pill{
      padding: 6px 10px;
      border-radius: 999px;
      border: 2px solid rgba(200,247,255,0.16);
      background: rgba(0,0,0,0.18);
      box-shadow: 0 8px 18px rgba(0,0,0,0.18);
      display: inline-flex;
      gap: 6px;
      align-items: center;
      white-space: nowrap;
    }

    .pill b{ color: var(--warn); }
    .pill .dot{ width: 10px; height: 10px; border-radius: 3px; background: rgba(200,247,255,0.45); display: inline-block; }
    .pill .dot.good{ background: rgba(136,255,182,0.75); }
    .pill .dot.bad{ background: rgba(255,107,107,0.75); }
    .pill .dot.warn{ background: rgba(255,211,107,0.75); }
    .pill .dot.combo{ background: rgba(255,107,214,0.75); }

    .footer{
      opacity: 0.8;
      font-size: 11px;
      text-align: center;
      margin-top: 4px;
    }

    /* Achievements panel */
    .panel{
      position: fixed;
      right: 14px;
      bottom: 14px;
      width: min(380px, calc(100vw - 28px));
      max-height: calc(100vh - 28px);
      border-radius: 16px;
      border: 2px solid rgba(200,247,255,0.18);
      background: rgba(2,16,27,0.88);
      box-shadow: 0 18px 36px rgba(0,0,0,0.28);
      padding: 12px;
      box-sizing: border-box;
      display: none;
      z-index: 10;
      backdrop-filter: blur(8px);
    }

    .panel.show{ display: block; }

    .panel h3{
      margin: 0 0 8px 0;
      font-size: 13px;
      letter-spacing: 1px;
      color: rgba(200,247,255,0.95);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .panel .close{
      border: 2px solid rgba(200,247,255,0.25);
      background: rgba(6, 38, 58, 0.55);
      padding: 4px 8px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 11px;
    }

    .lifetime-stats{
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-bottom: 10px;
      padding: 8px;
      border-radius: 10px;
      background: rgba(200,247,255,0.04);
      border: 1px solid rgba(200,247,255,0.08);
    }

    .lifetime-stats .ls{
      text-align: center;
      font-size: 11px;
      color: rgba(200,247,255,0.7);
    }
    .lifetime-stats .ls b{
      display: block;
      font-size: 16px;
      color: var(--warn);
    }

    .ach-list{
      max-height: 220px;
      overflow: auto;
      padding-right: 6px;
    }

    .ach{
      display: grid;
      grid-template-columns: 18px 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 8px 8px;
      border-radius: 12px;
      border: 2px solid rgba(200,247,255,0.10);
      background: rgba(255,255,255,0.03);
      margin-bottom: 6px;
      transition: border-color 0.3s;
    }

    .ach .badge{
      width: 18px;
      height: 18px;
      border-radius: 6px;
      background: rgba(200,247,255,0.15);
      border: 2px solid rgba(200,247,255,0.18);
    }

    .ach.unlocked .badge{
      background: rgba(136,255,182,0.20);
      border-color: rgba(136,255,182,0.45);
    }

    .ach .name{
      font-size: 12px;
      color: rgba(200,247,255,0.92);
    }

    .ach .desc{
      font-size: 11px;
      color: rgba(200,247,255,0.65);
      margin-top: 2px;
      line-height: 1.25;
    }

    .ach .status{
      font-size: 11px;
      color: rgba(200,247,255,0.60);
    }

    .ach.unlocked .status{
      color: rgba(136,255,182,0.85);
    }

    /* Toast */
    .toast{
      position: fixed;
      left: 14px;
      bottom: 14px;
      padding: 10px 12px;
      border-radius: 14px;
      border: 2px solid rgba(200,247,255,0.18);
      background: rgba(2,16,27,0.85);
      box-shadow: 0 18px 36px rgba(0,0,0,0.28);
      font-size: 12px;
      color: rgba(200,247,255,0.95);
      display: none;
      z-index: 11;
      max-width: min(420px, calc(100vw - 28px));
      backdrop-filter: blur(6px);
    }
    .toast.show{ display: block; animation: toastIn 0.25s ease-out; }
    .toast b{ color: var(--good); }
    .toast .combo-toast{ color: #ff6bd6; }

    @keyframes toastIn{
      from{ opacity: 0; transform: translateY(12px); }
      to{ opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 520px){
      .title h1{ font-size: 16px; }
      button{ font-size: 11px; padding: 7px 9px; }
      .hud{ grid-template-columns: 1fr; }
      .stats{ justify-content: flex-start; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="frame">
      <div class="topbar">
        <div class="title">
          <h1>FLAPPY FISH</h1>
          <div class="tag">underwater retro pixel runner</div>
        </div>
        <div class="buttons">
          <button id="btnStart">Start</button>
          <button id="btnRestart">Restart</button>
          <button id="btnMute">Sound: On</button>
          <button id="btnAch">Achievements</button>
        </div>
      </div>

      <div class="card">
        <div class="row">
          <canvas id="game" width="960" height="540" aria-label="Flappy Fish game"></canvas>

          <div class="hud">
            <div class="hint">
              Space / click / tap to swim. Avoid coral gates. Hug gates close for near-miss bonus!
              <br />R restarts. M toggles sound.
            </div>
            <div class="stats">
              <div class="pill"><span class="dot warn"></span>Score <b id="score">0</b></div>
              <div class="pill"><span class="dot good"></span>Best <b id="best">0</b></div>
              <div class="pill"><span class="dot combo"></span>Combo <b id="combo">—</b></div>
              <div class="pill"><span class="dot"></span><b id="mode">Ready</b></div>
              <div class="pill"><span class="dot good"></span>Shield <b id="shield">0</b></div>
            </div>
          </div>
        </div>
      </div>

      <div class="footer">Tap fast, combo hard, beat your best. Achievements persist.</div>
    </div>
  </div>

  <div id="panel" class="panel" role="dialog" aria-label="Achievements">
    <h3>
      <span>ACHIEVEMENTS</span>
      <span class="close" id="panelClose">Close</span>
    </h3>
    <div class="lifetime-stats" id="lifetimeStats"></div>
    <div class="ach-list" id="achList"></div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    (() => {
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");

      const scoreEl = document.getElementById("score");
      const bestEl = document.getElementById("best");
      const modeEl = document.getElementById("mode");
      const shieldEl = document.getElementById("shield");
      const comboEl = document.getElementById("combo");

      const btnStart = document.getElementById("btnStart");
      const btnRestart = document.getElementById("btnRestart");
      const btnMute = document.getElementById("btnMute");
      const btnAch = document.getElementById("btnAch");

      const panel = document.getElementById("panel");
      const panelClose = document.getElementById("panelClose");
      const achListEl = document.getElementById("achList");
      const lifetimeEl = document.getElementById("lifetimeStats");

      const toast = document.getElementById("toast");

      ctx.imageSmoothingEnabled = false;

      const W = canvas.width;
      const H = canvas.height;

      const GROUND_Y = H - 54;

      const GRAVITY = 1800;
      const SWIM_V = -520;

      const PIPE_W = 72;
      const PIPE_GAP_MIN = 148;
      const PIPE_GAP_MAX = 195;
      const PIPE_SPACING = 250;
      const PIPE_SPEED_START = 260;
      const SPEED_RAMP = 0.016;

      const POWERUP_SPAWN_CHANCE = 0.24;
      const POWERUP_SIZE = 14;

      // Near miss threshold — how close to pipe edge to trigger bonus
      const NEAR_MISS_PX = 22;

      const FISH = {
        x: 190,
        y: H * 0.5,
        r: 14,
        vy: 0
      };

      const RNG = (min, max) => min + Math.random() * (max - min);
      const pick = arr => arr[Math.floor(Math.random() * arr.length)];

      // ===== SCREEN JUICE =====
      let screenShake = 0;
      let screenFlashAlpha = 0;
      let screenFlashColor = "rgba(255,255,255,";
      let freezeTimer = 0; // hit-freeze effect

      function shake(amount) { screenShake = Math.max(screenShake, amount); }
      function flash(color, alpha) { screenFlashColor = color; screenFlashAlpha = alpha; }

      // ===== FLOATING TEXT PARTICLES =====
      let floatingTexts = [];
      function spawnFloatingText(x, y, text, color = "#ffd36b", size = 18) {
        floatingTexts.push({ x, y, text, color, size, life: 1.2, maxLife: 1.2, vy: -90 });
      }

      // ===== COMBO SYSTEM =====
      let comboCount = 0;
      let comboTimer = 0;
      const COMBO_WINDOW = 2.8; // seconds to keep combo alive
      const COMBO_NAMES = ["", "", "DOUBLE", "TRIPLE", "QUAD", "PENTA", "HEXA", "ULTRA", "MEGA", "INSANE", "GODLIKE"];

      function addCombo() {
        comboCount++;
        comboTimer = COMBO_WINDOW;
        if (comboCount >= 3) {
          const name = COMBO_NAMES[Math.min(comboCount, COMBO_NAMES.length - 1)];
          spawnFloatingText(FISH.x + 30, FISH.y - 40, name + "!", "#ff6bd6", 22);
          beep(440 + comboCount * 80, 0.06, "square", 0.025);
          shake(3 + comboCount);
        }
        comboEl.textContent = comboCount >= 2 ? `x${comboCount}` : "—";
      }

      function getComboMultiplier() {
        if (comboCount < 2) return 1;
        if (comboCount < 4) return 1.5;
        if (comboCount < 6) return 2;
        if (comboCount < 8) return 2.5;
        return 3;
      }

      function breakCombo() {
        if (comboCount >= 3) {
          spawnFloatingText(FISH.x, FISH.y - 30, "combo broke", "rgba(255,107,107,0.8)", 13);
        }
        comboCount = 0;
        comboEl.textContent = "—";
      }

      // ===== NEAR-MISS SYSTEM =====
      function checkNearMiss(pipe) {
        const cx = FISH.x;
        const cy = FISH.y;
        const gapTop = pipe.topH;
        const gapBottom = pipe.topH + pipe.gap;

        const distToTop = Math.abs(cy - gapTop);
        const distToBottom = Math.abs(cy - gapBottom);
        const closest = Math.min(distToTop, distToBottom);

        if (closest < NEAR_MISS_PX && cx > pipe.x && cx < pipe.x + PIPE_W + 20) {
          return true;
        }
        return false;
      }

      // ===== DEATH MESSAGES =====
      const DEATH_MSGS = [
        "So close!", "Almost!", "One more try!", "You got this!",
        "The fish believes in you!", "That gate was unfair tbh",
        "Warming up!", "Next run is THE run", "Shake it off!",
        "The coral was scared of you", "Learning the ocean!",
        "That was a practice run", "Your fish misses you already",
        "The gates are trembling", "Just getting started!"
      ];

      const MILESTONE_MSGS = {
        5: "Getting the hang of it!",
        10: "Double digits! Nice!",
        15: "The ocean respects you now",
        20: "Officially a fish pilot",
        25: "Quarter century of gates!",
        30: "The coral fears your name",
        40: "Legendary swimmer!",
        50: "TRENCH LEGEND STATUS"
      };

      // ===== FISH EVOLUTION =====
      // Fish changes appearance based on score
      function getFishColors(s) {
        if (s >= 40) return { body: "#ff6bff", fin: "#ff6b6b", tail: "#ffd36b", eye: "#fff", glow: "rgba(255,107,255,0.15)" };
        if (s >= 25) return { body: "#6bffea", fin: "#ff6bd6", tail: "#b84cff", eye: "#fff", glow: "rgba(107,255,234,0.12)" };
        if (s >= 15) return { body: "#88ffb6", fin: "#ffd36b", tail: "#ff9a6b", eye: "#0b1a2a", glow: "rgba(136,255,182,0.10)" };
        if (s >= 8) return { body: "#ffe6a3", fin: "#ff9a6b", tail: "#ff6b6b", eye: "#0b1a2a", glow: "rgba(255,230,163,0.06)" };
        return { body: "#ffd36b", fin: "#ff9a6b", tail: "#ff6b6b", eye: "#0b1a2a", glow: null };
      }

      // ===== GOLDEN GATE EVENT =====
      // Randomly a pipe becomes golden = worth 5x points
      const GOLDEN_CHANCE = 0.08;

      // Audio
      let audioOn = true;
      let audioCtx = null;

      function beep(freq = 440, duration = 0.06, type = "square", gain = 0.03) {
        if (!audioOn) return;
        try {
          if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          const now = audioCtx.currentTime;
          const o = audioCtx.createOscillator();
          const g = audioCtx.createGain();
          o.type = type;
          o.frequency.setValueAtTime(freq, now);
          g.gain.setValueAtTime(gain, now);
          g.gain.exponentialRampToValueAtTime(0.0001, now + duration);
          o.connect(g);
          g.connect(audioCtx.destination);
          o.start(now);
          o.stop(now + duration);
        } catch (e) {}
      }

      function playComboBeep(combo) {
        const base = 600;
        for (let i = 0; i < Math.min(combo, 5); i++) {
          setTimeout(() => beep(base + i * 120, 0.04, "square", 0.02), i * 40);
        }
      }

      const STATE = {
        ready: "Ready",
        playing: "Playing",
        over: "Game Over"
      };

      let state = STATE.ready;

      let pipes = [];
      let bubbles = [];
      let powerups = [];
      let particles = []; // generic particle system

      let t = 0;
      let last = performance.now();

      let score = 0;
      let best = 0;

      // Persistent lifetime stats
      let lifetime = { runs: 0, totalScore: 0, totalGates: 0, bestCombo: 0, nearMisses: 0, deaths: 0 };
      try {
        const saved = JSON.parse(localStorage.getItem("flappyFishLifetime") || "{}");
        if (saved.runs !== undefined) lifetime = saved;
      } catch (e) {}

      function saveLifetime() {
        try { localStorage.setItem("flappyFishLifetime", JSON.stringify(lifetime)); } catch(e) {}
      }

      // Run tracking for achievements
      let run = {
        swims: 0,
        bonusBubbles: 0,
        usedPowerups: 0,
        lastSwimTime: 0,
        gatesSinceSwim: 0,
        shieldSavedYou: false,
        nearMisses: 0,
        maxCombo: 0,
        goldenGates: 0
      };

      // Buffs and inventory
      const buffs = {
        shieldCharges: 0,
        slowTime: 0,
        magnet: 0,
        x2: 0
      };

      function activeBuffList() {
        const a = [];
        if (buffs.slowTime > 0) a.push("Slow");
        if (buffs.magnet > 0) a.push("Magnet");
        if (buffs.x2 > 0) a.push("x2");
        return a.length ? a.join(", ") : "—";
      }

      // ===== ACHIEVEMENTS =====
      const ACH = [
        { id:"first_swim", name:"First Swim", desc:"Swim for the first time.", check: () => run.swims >= 1 },
        { id:"first_bubble", name:"Bubble Popper", desc:"Collect your first bonus bubble.", check: () => run.bonusBubbles >= 1 },
        { id:"score_10", name:"Ten Deep", desc:"Reach score 10 in a run.", check: () => score >= 10 },
        { id:"score_25", name:"Sea Veteran", desc:"Reach score 25 in a run.", check: () => score >= 25 },
        { id:"score_50", name:"Trench Legend", desc:"Reach score 50 in a run.", check: () => score >= 50 },
        { id:"survivor_5", name:"No Panic", desc:"Pass 5 gates without swimming.", check: () => run.gatesSinceSwim >= 5 },
        { id:"clean_15", name:"Clean Run", desc:"Score 15 without using any powerups.", check: () => score >= 15 && run.usedPowerups === 0 },
        { id:"bubble_10", name:"Bubble Hunter", desc:"Collect 10 bonus bubbles in one run.", check: () => run.bonusBubbles >= 10 },
        { id:"shield_save", name:"Unbreakable", desc:"Let a shield save you from a crash.", check: () => run.shieldSavedYou },
        { id:"near_3", name:"Daredevil", desc:"Get 3 near-misses in one run.", check: () => run.nearMisses >= 3 },
        { id:"near_10", name:"Thread the Needle", desc:"Get 10 near-misses in one run.", check: () => run.nearMisses >= 10 },
        { id:"combo_5", name:"Combo King", desc:"Reach a 5x combo.", check: () => comboCount >= 5 },
        { id:"combo_8", name:"Unstoppable", desc:"Reach an 8x combo.", check: () => comboCount >= 8 },
        { id:"golden", name:"Golden Gate", desc:"Pass through a golden gate.", check: () => run.goldenGates >= 1 },
        { id:"evolve", name:"Evolution", desc:"Score 15+ and see your fish transform.", check: () => score >= 15 },
        { id:"runs_10", name:"Dedicated", desc:"Play 10 total runs.", check: () => lifetime.runs >= 10 },
        { id:"runs_50", name:"Obsessed", desc:"Play 50 total runs.", check: () => lifetime.runs >= 50 },
        { id:"lifetime_500", name:"500 Club", desc:"Earn 500 total lifetime points.", check: () => lifetime.totalScore >= 500 },
      ];

      let unlocked = {};
      try {
        unlocked = JSON.parse(localStorage.getItem("flappyFishAchievements") || "{}");
      } catch (e) {
        unlocked = {};
      }

      function saveAchievements() {
        try { localStorage.setItem("flappyFishAchievements", JSON.stringify(unlocked)); } catch (e) {}
      }

      function showToast(html, ms = 2200) {
        toast.innerHTML = html;
        toast.classList.add("show");
        clearTimeout(showToast._t);
        showToast._t = setTimeout(() => toast.classList.remove("show"), ms);
      }

      function unlockIfNeeded() {
        for (const a of ACH) {
          if (unlocked[a.id]) continue;
          if (a.check()) {
            unlocked[a.id] = { at: Date.now() };
            saveAchievements();
            beep(1200, 0.06, "square", 0.02);
            setTimeout(() => beep(1600, 0.05, "square", 0.015), 60);
            showToast(`Achievement: <b>${a.name}</b>`);
            // celebration particles
            for (let i = 0; i < 20; i++) {
              particles.push({
                x: FISH.x + RNG(-20, 20), y: FISH.y + RNG(-20, 20),
                vx: RNG(-180, 180), vy: RNG(-200, 50),
                life: RNG(0.5, 1.2), maxLife: 1.2,
                size: RNG(3, 7),
                color: pick(["#ffd36b", "#88ffb6", "#ff6bd6", "#7ee7ff", "#ff6b6b"])
              });
            }
          }
        }
      }

      function renderAchievementsList() {
        // Lifetime stats
        lifetimeEl.innerHTML = `
          <div class="ls"><b>${lifetime.runs}</b>runs</div>
          <div class="ls"><b>${lifetime.totalScore}</b>points</div>
          <div class="ls"><b>${lifetime.bestCombo}x</b>best combo</div>
        `;

        achListEl.innerHTML = "";
        for (const a of ACH) {
          const isOn = !!unlocked[a.id];
          const div = document.createElement("div");
          div.className = "ach" + (isOn ? " unlocked" : "");
          div.innerHTML = `
            <div class="badge"></div>
            <div>
              <div class="name">${a.name}</div>
              <div class="desc">${a.desc}</div>
            </div>
            <div class="status">${isOn ? "UNLOCKED" : "LOCKED"}</div>
          `;
          achListEl.appendChild(div);
        }
      }

      // Best score
      try {
        best = Number(localStorage.getItem("flappyFishBest") || "0");
      } catch (e) {
        best = 0;
      }
      bestEl.textContent = String(best);

      function setState(s) {
        state = s;
        modeEl.textContent = s;
      }

      function reset() {
        FISH.y = H * 0.5;
        FISH.vy = 0;

        pipes = [];
        bubbles = [];
        powerups = [];
        particles = [];
        floatingTexts = [];

        t = 0;
        score = 0;
        comboCount = 0;
        comboTimer = 0;
        comboEl.textContent = "—";
        screenShake = 0;
        screenFlashAlpha = 0;
        freezeTimer = 0;

        run = {
          swims: 0,
          bonusBubbles: 0,
          usedPowerups: 0,
          lastSwimTime: 0,
          gatesSinceSwim: 0,
          shieldSavedYou: false,
          nearMisses: 0,
          maxCombo: 0,
          goldenGates: 0
        };

        buffs.shieldCharges = 0;
        buffs.slowTime = 0;
        buffs.magnet = 0;
        buffs.x2 = 0;

        scoreEl.textContent = "0";
        shieldEl.textContent = "0";

        const firstX = W + 120;
        for (let i = 0; i < 5; i++) spawnPipe(firstX + i * PIPE_SPACING);

        spawnBubbleBurst(W + 200, true);
        renderAchievementsList();
      }

      function spawnPipe(x) {
        const gap = RNG(PIPE_GAP_MIN, PIPE_GAP_MAX);
        const topMin = 60;
        const topMax = GROUND_Y - 70 - gap;
        const topH = Math.floor(RNG(topMin, Math.max(topMin + 1, topMax)));
        const golden = Math.random() < GOLDEN_CHANCE;

        pipes.push({ x, topH, gap, passed: false, nearMissed: false, golden });

        // Bonus bubble near the gap center sometimes
        if (Math.random() < 0.55) {
          const bx = x + PIPE_W * 0.5 + RNG(-18, 18);
          const by = topH + gap * 0.5 + RNG(-28, 28);
          bubbles.push(makeBubble(bx, by, 10, true));
        }

        // Powerup sometimes
        if (Math.random() < POWERUP_SPAWN_CHANCE) {
          const px = x + PIPE_W * 0.5;
          const py = topH + gap * 0.5 + RNG(-38, 38);
          const kind = pickPowerupKind();
          powerups.push(makePowerup(px, py, kind));
        }
      }

      function pickPowerupKind() {
        const roll = Math.random();
        if (roll < 0.32) return "shield";
        if (roll < 0.56) return "slow";
        if (roll < 0.80) return "magnet";
        return "x2";
      }

      function makePowerup(x, y, kind) {
        return { x, y, r: POWERUP_SIZE, kind, spin: RNG(0, Math.PI * 2), wob: RNG(0, 10), alive: true };
      }

      function applyPowerup(kind) {
        run.usedPowerups += 1;

        const msgs = {
          shield: ["Shield +1!", "Protected!", "Armor up!"],
          slow: ["Slow time!", "Time warp!", "Easy mode!"],
          magnet: ["Magnet!", "Come to me!", "Bubble vacuum!"],
          x2: ["x2 Score!", "Double up!", "Big points!"]
        };

        if (kind === "shield") {
          buffs.shieldCharges += 1;
          beep(740, 0.06, "square", 0.02);
        }
        if (kind === "slow") {
          buffs.slowTime = Math.max(buffs.slowTime, 6.5);
          beep(520, 0.06, "square", 0.02);
        }
        if (kind === "magnet") {
          buffs.magnet = Math.max(buffs.magnet, 7.0);
          beep(900, 0.05, "square", 0.02);
        }
        if (kind === "x2") {
          buffs.x2 = Math.max(buffs.x2, 7.0);
          beep(1200, 0.05, "square", 0.02);
        }

        spawnFloatingText(FISH.x + 30, FISH.y - 25, pick(msgs[kind]), "#7ee7ff", 14);
        flash("rgba(200,247,255,", 0.12);
      }

      function makeBubble(x, y, size, bonus=false) {
        return {
          x, y,
          r: size,
          vx: RNG(-10, 18),
          vy: RNG(-40, -110),
          life: RNG(2.0, 4.0),
          bonus
        };
      }

      function spawnBubbleBurst(x, gentle=false) {
        const n = gentle ? 6 : 12;
        for (let i = 0; i < n; i++) {
          bubbles.push(makeBubble(
            x + RNG(-40, 40),
            RNG(GROUND_Y - 120, GROUND_Y - 40),
            RNG(5, 12),
            false
          ));
        }
      }

      // Explosion particles for death and events
      function spawnExplosion(x, y, count, colors) {
        for (let i = 0; i < count; i++) {
          const angle = (Math.PI * 2 * i) / count + RNG(-0.3, 0.3);
          const speed = RNG(80, 280);
          particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: RNG(0.4, 1.0),
            maxLife: 1.0,
            size: RNG(3, 8),
            color: pick(colors)
          });
        }
      }

      function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }

      function circleRectCollide(cx, cy, cr, rx, ry, rw, rh) {
        const nx = clamp(cx, rx, rx + rw);
        const ny = clamp(cy, ry, ry + rh);
        const dx = cx - nx;
        const dy = cy - ny;
        return (dx * dx + dy * dy) <= cr * cr;
      }

      function fishCollectsCircle(x, y, r) {
        const dx = FISH.x - x;
        const dy = FISH.y - y;
        const rr = (FISH.r + r) * (FISH.r + r);
        return dx * dx + dy * dy <= rr;
      }

      function fishCollidesPipe(p) {
        const cx = FISH.x;
        const cy = FISH.y;
        const cr = FISH.r;

        const topRect = { x: p.x, y: 0, w: PIPE_W, h: p.topH };
        const bottomY = p.topH + p.gap;
        const bottomRect = { x: p.x, y: bottomY, w: PIPE_W, h: (GROUND_Y - bottomY) };

        if (circleRectCollide(cx, cy, cr, topRect.x, topRect.y, topRect.w, topRect.h)) return true;
        if (circleRectCollide(cx, cy, cr, bottomRect.x, bottomRect.y, bottomRect.w, bottomRect.h)) return true;

        if (cy + cr > GROUND_Y) return true;
        if (cy - cr < 0) return true;

        return false;
      }

      // Background layers
      const bg = {
        farX: 0, midX: 0, nearX: 0,
        sprites: Array.from({ length: 14 }, () => ({
          x: RNG(0, W), y: RNG(40, GROUND_Y - 120),
          s: RNG(0.8, 1.8), v: RNG(8, 24)
        }))
      };

      // Pixel helpers
      function pxRect(x, y, w, h, c) {
        ctx.fillStyle = c;
        ctx.fillRect(Math.round(x), Math.round(y), Math.round(w), Math.round(h));
      }

      function pxText(txt, x, y, c, size = 14) {
        ctx.fillStyle = c;
        ctx.font = `${size}px ui-monospace, Menlo, Consolas, monospace`;
        ctx.textBaseline = "top";
        ctx.fillText(txt, Math.round(x), Math.round(y));
      }

      function pxTextCenter(txt, x, y, c, size = 14) {
        ctx.fillStyle = c;
        ctx.font = `${size}px ui-monospace, Menlo, Consolas, monospace`;
        ctx.textBaseline = "top";
        ctx.textAlign = "center";
        ctx.fillText(txt, Math.round(x), Math.round(y));
        ctx.textAlign = "left";
      }

      function drawTinyFish(x, y, s, c) {
        const w = Math.round(12 * s);
        const h = Math.round(6 * s);
        pxRect(x, y, w, h, c);
        pxRect(x + w, y + Math.floor(h/2) - 1, 4, 3, c);
        pxRect(x - 4, y + 1, 4, 4, c);
      }

      function drawSilhouetteLayer(offsetX, alpha) {
        ctx.globalAlpha = alpha;
        for (let i = 0; i < 9; i++) {
          const x = offsetX + i * 120;
          const y = 90 + Math.floor((i % 3) * 18);
          const w = Math.floor(110 * (1.2 - (i % 3) * 0.1));
          const h = Math.floor(60 * (1.0 - (i % 2) * 0.1));
          pxRect(x, y, w, h, "rgba(0,0,0,1)");
          for (let k = 0; k < w; k += 10) pxRect(x + k, y - 8, 8, 8, "rgba(0,0,0,1)");
        }
        ctx.globalAlpha = 1;
      }

      function drawSeaweedLayer(offsetX, alpha) {
        ctx.globalAlpha = alpha;
        for (let i = 0; i < 14; i++) {
          const x = offsetX + i * 76 + (i % 2) * 12;
          const base = GROUND_Y - 4;
          const height = 50 + (i % 5) * 22;
          const sway = Math.floor(6 * Math.sin(t * 2 + i));
          for (let y = 0; y < height; y += 8) {
            pxRect(x + Math.floor(sway * (y / height)), base - y, 8, 8, "rgba(35,160,140,1)");
            if (i % 3 === 0) pxRect(x + 8 + Math.floor(sway * (y / height)), base - y + 4, 6, 6, "rgba(22,110,96,1)");
          }
        }
        ctx.globalAlpha = 1;
      }

      function drawRockLayer(offsetX) {
        for (let i = 0; i < 8; i++) {
          const x = offsetX + i * 130;
          const y = GROUND_Y - 22;
          const w = 90 + (i % 3) * 26;
          const h = 28 + (i % 2) * 14;
          pxRect(x, y, w, h, "rgba(0,0,0,0.35)");
          pxRect(x + 6, y + 6, w - 12, h - 10, "rgba(10,40,58,0.65)");
          pxRect(x + 12, y + 12, Math.max(10, w - 34), 8, "rgba(200,247,255,0.08)");
        }
      }

      function drawBackground(dt, speed) {
        for (let i = 0; i < 18; i++) {
          const y = i * (H / 18);
          const k = i / 18;
          const r = Math.floor(5 + 20 * (1 - k));
          const g = Math.floor(25 + 80 * (1 - k));
          const b = Math.floor(46 + 100 * (1 - k));
          ctx.fillStyle = `rgb(${r},${g},${b})`;
          ctx.fillRect(0, Math.round(y), W, Math.ceil(H / 18));
        }

        ctx.globalAlpha = 0.10;
        for (let i = 0; i < 7; i++) {
          const x = (i * 160 + (t * 30) % 160) - 120;
          ctx.fillStyle = "rgba(200,247,255,1)";
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x + 70, 0);
          ctx.lineTo(x + 190, H);
          ctx.lineTo(x + 120, H);
          ctx.closePath();
          ctx.fill();
        }
        ctx.globalAlpha = 1;

        bg.farX -= dt * (speed * 0.10);
        if (bg.farX < -W) bg.farX += W;
        drawSilhouetteLayer(Math.round(bg.farX), 0.18);
        drawSilhouetteLayer(Math.round(bg.farX + W), 0.18);

        bg.midX -= dt * (speed * 0.22);
        if (bg.midX < -W) bg.midX += W;
        drawSeaweedLayer(Math.round(bg.midX), 0.25);
        drawSeaweedLayer(Math.round(bg.midX + W), 0.25);

        bg.nearX -= dt * (speed * 0.36);
        if (bg.nearX < -W) bg.nearX += W;
        drawRockLayer(Math.round(bg.nearX));
        drawRockLayer(Math.round(bg.nearX + W));

        ctx.globalAlpha = 0.35;
        for (const s of bg.sprites) {
          s.x -= dt * s.v;
          if (s.x < -20) {
            s.x = W + RNG(0, 120);
            s.y = RNG(40, GROUND_Y - 120);
            s.s = RNG(0.8, 1.8);
            s.v = RNG(8, 24);
          }
          drawTinyFish(s.x, s.y, s.s, "rgba(0,0,0,0.85)");
        }
        ctx.globalAlpha = 1;

        pxRect(0, GROUND_Y, W, H - GROUND_Y, "rgba(2,12,18,0.85)");
        for (let i = 0; i < W; i += 18) {
          const h = 6 + Math.floor(6 * Math.sin((i + t * 40) * 0.02));
          pxRect(i, GROUND_Y + 2, 10, Math.max(2, h), "rgba(20,90,92,0.30)");
        }
      }

      function drawFish() {
        const x = Math.round(FISH.x);
        const y = Math.round(FISH.y);

        const tilt = clamp(FISH.vy / 700, -0.7, 0.7);
        const fc = getFishColors(score);

        // Glow for evolved fish
        if (fc.glow) {
          ctx.globalAlpha = 0.5;
          pxRect(x - 32, y - 32, 64, 64, fc.glow);
          ctx.globalAlpha = 1;
        }

        // Shield ring
        if (buffs.shieldCharges > 0) {
          ctx.globalAlpha = 0.18 + 0.08 * Math.sin(t * 6);
          pxRect(x - 28, y - 28, 56, 56, "rgba(136,255,182,1)");
          ctx.globalAlpha = 1;
        }

        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(tilt);

        // Shadow
        ctx.globalAlpha = 0.25;
        pxRect(-16, 18, 32, 6, "rgba(0,0,0,1)");
        ctx.globalAlpha = 1;

        // Body
        pxRect(-18, -10, 30, 20, fc.body);
        pxRect(-14, -14, 18, 6, "#ffe6a3");
        pxRect(-10, 8, 18, 6, fc.fin);

        // Tail
        pxRect(12, -6, 10, 12, fc.fin);
        pxRect(22, -10, 6, 20, fc.tail);
        pxRect(28, -6, 4, 12, fc.fin);

        // Bottom fin
        pxRect(-2, 2, 10, 8, fc.fin);
        pxRect(4, 8, 6, 4, fc.tail);

        // Eye
        pxRect(-8, -4, 6, 6, fc.eye);
        pxRect(-6, -2, 2, 2, "#c8f7ff");

        // Evolved crown for 25+
        if (score >= 25) {
          pxRect(-12, -18, 4, 6, "#ffd36b");
          pxRect(-4, -20, 4, 8, "#ffd36b");
          pxRect(4, -18, 4, 6, "#ffd36b");
          pxRect(-14, -14, 22, 4, "#ffd36b");
        }

        // Evolved stars for 40+
        if (score >= 40) {
          const sparkle = Math.sin(t * 12) > 0.3;
          if (sparkle) {
            pxRect(-22, -6, 3, 3, "#fff");
            pxRect(14, -16, 3, 3, "#fff");
          }
        }

        // Swim particles
        if (state === STATE.playing && Math.random() < 0.25) {
          bubbles.push(makeBubble(
            FISH.x - 14,
            FISH.y + RNG(-8, 10),
            RNG(4, 8),
            false
          ));
        }

        ctx.restore();
      }

      function drawPipe(p) {
        const x = Math.round(p.x);
        const topH = Math.round(p.topH);
        const gap = Math.round(p.gap);

        let c0, c1, c2, c3;

        if (p.golden) {
          c0 = "#ffd36b";
          c1 = "#ffb627";
          c2 = "#fff5d6";
          c3 = "#ffe082";
          // golden shimmer
          const shimmer = 0.7 + 0.3 * Math.sin(t * 8 + p.x * 0.01);
          ctx.globalAlpha = shimmer;
        } else {
          c0 = "#ff6bd6";
          c1 = "#b84cff";
          c2 = "#6bffea";
          c3 = "#2dd6ff";
        }

        pxRect(x, 0, PIPE_W, topH, "rgba(0,0,0,0.25)");
        pxRect(x + 4, 4, PIPE_W - 8, topH - 8, c1);

        for (let i = 0; i < PIPE_W; i += 12) {
          pxRect(x + i + 2, topH - 12, 10, 10, c0);
          if (i % 24 === 0) pxRect(x + i + 4, topH - 22, 8, 8, c2);
        }

        const by = topH + gap;
        const bh = GROUND_Y - by;

        pxRect(x, by, PIPE_W, bh, "rgba(0,0,0,0.25)");
        pxRect(x + 4, by + 4, PIPE_W - 8, bh - 8, c3);

        for (let i = 0; i < PIPE_W; i += 12) {
          pxRect(x + i + 2, by + 2, 10, 10, c2);
          if (i % 24 === 0) pxRect(x + i + 4, by + 14, 8, 8, c0);
        }

        ctx.globalAlpha = 0.25;
        pxRect(x - 2, topH - 2, PIPE_W + 4, 4, p.golden ? "#fff5d6" : "#c8f7ff");
        pxRect(x - 2, by - 2, PIPE_W + 4, 4, p.golden ? "#fff5d6" : "#c8f7ff");
        ctx.globalAlpha = 1;
      }

      function drawBubbles() {
        for (const b of bubbles) {
          ctx.globalAlpha = 0.85;
          pxRect(b.x - b.r, b.y - b.r, b.r * 2, b.r * 2, "rgba(200,247,255,0.18)");

          ctx.globalAlpha = 0.9;
          pxRect(b.x - Math.floor(b.r/2), b.y - Math.floor(b.r/2), Math.max(2, Math.floor(b.r/2)), Math.max(2, Math.floor(b.r/2)), "rgba(200,247,255,0.55)");

          if (b.bonus) {
            ctx.globalAlpha = 0.55 + 0.2 * Math.sin(t * 6);
            pxRect(b.x - b.r + 2, b.y - b.r + 2, b.r * 2 - 4, b.r * 2 - 4, "rgba(255,211,107,0.45)");
          }
          ctx.globalAlpha = 1;
        }
      }

      function drawPowerups() {
        for (const p of powerups) {
          if (!p.alive) continue;

          const x = Math.round(p.x);
          const y = Math.round(p.y);

          const pulse = 0.65 + 0.35 * Math.sin(t * 5 + p.wob);

          let base = "rgba(200,247,255,0.18)";
          let core = "rgba(200,247,255,0.55)";
          let tint = "rgba(200,247,255,0.20)";
          let label = "?";

          if (p.kind === "shield") { tint = "rgba(136,255,182,0.25)"; label = "S"; }
          if (p.kind === "slow") { tint = "rgba(126,231,255,0.25)"; label = "T"; }
          if (p.kind === "magnet") { tint = "rgba(255,211,107,0.22)"; label = "M"; }
          if (p.kind === "x2") { tint = "rgba(255,107,107,0.20)"; label = "2"; }

          ctx.globalAlpha = 0.9;
          pxRect(x - p.r, y - p.r, p.r * 2, p.r * 2, base);

          ctx.globalAlpha = 0.85 * pulse;
          pxRect(x - p.r + 2, y - p.r + 2, p.r * 2 - 4, p.r * 2 - 4, tint);

          ctx.globalAlpha = 0.95;
          pxRect(x - 5, y - 6, 10, 12, core);
          ctx.globalAlpha = 1;

          pxText(label, x - 4, y - 8, "rgba(2,16,27,0.85)", 16);
        }
      }

      function drawParticles() {
        for (const p of particles) {
          const alpha = p.life / p.maxLife;
          ctx.globalAlpha = alpha;
          pxRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size, p.color);
        }
        ctx.globalAlpha = 1;
      }

      function drawFloatingTexts() {
        for (const ft of floatingTexts) {
          const alpha = ft.life / ft.maxLife;
          ctx.globalAlpha = alpha;
          pxTextCenter(ft.text, ft.x, ft.y, ft.color, ft.size);
        }
        ctx.globalAlpha = 1;
      }

      // Combo bar visualization
      function drawComboBar() {
        if (comboCount < 2) return;
        const barW = 120;
        const barH = 6;
        const bx = FISH.x - barW/2;
        const by = FISH.y - 38;
        const fill = comboTimer / COMBO_WINDOW;

        ctx.globalAlpha = 0.5;
        pxRect(bx, by, barW, barH, "rgba(0,0,0,0.5)");
        const comboColor = comboCount >= 8 ? "#ff6bff" : comboCount >= 5 ? "#ff6bd6" : "#ffd36b";
        pxRect(bx, by, barW * fill, barH, comboColor);
        ctx.globalAlpha = 1;

        pxTextCenter(`x${comboCount}`, FISH.x, by - 16, comboColor, 14);
      }

      function drawOverlay() {
        if (state === STATE.playing) return;

        ctx.globalAlpha = 0.92;
        pxRect(0, 0, W, H, "rgba(0,0,0,0.22)");
        ctx.globalAlpha = 1;

        const bx = 70;
        const by = 60;
        const bw = W - 140;
        const bh = state === STATE.over ? 320 : 240;

        pxRect(bx, by, bw, bh, "rgba(0,0,0,0.32)");
        pxRect(bx + 6, by + 6, bw - 12, bh - 12, "rgba(6,38,58,0.75)");
        pxRect(bx + 6, by + 6, bw - 12, 4, "rgba(200,247,255,0.25)");
        pxRect(bx + 6, by + bh - 10, bw - 12, 4, "rgba(200,247,255,0.12)");

        if (state === STATE.over) {
          const deathMsg = pick(DEATH_MSGS);
          const milestoneMsg = Object.entries(MILESTONE_MSGS)
            .filter(([k]) => score >= Number(k))
            .pop();

          pxText("GAME OVER", bx + 36, by + 26, "#c8f7ff", 34);

          // Score display
          const sx = bx + 36;
          pxText("Score", sx, by + 74, "rgba(200,247,255,0.85)", 14);
          pxText(String(score), sx, by + 94, "#ffd36b", 30);

          // Was it a new best?
          if (score >= best && score > 0) {
            pxText("NEW BEST!", sx + 120, by + 98, "#88ffb6", 18);
          } else {
            pxText(`Best: ${best}`, sx + 120, by + 100, "#7ee7ff", 14);
            // "Almost" nudge
            if (best > 0 && score >= best - 3 && score < best) {
              pxText(`Only ${best - score} away from your best!`, sx + 120, by + 120, "#ffd36b", 13);
            }
          }

          // Run stats
          const statsY = by + 142;
          pxText(`Combo: ${run.maxCombo}x`, sx, statsY, "rgba(200,247,255,0.75)", 13);
          pxText(`Near-misses: ${run.nearMisses}`, sx + 160, statsY, "rgba(200,247,255,0.75)", 13);
          pxText(`Bubbles: ${run.bonusBubbles}`, sx + 340, statsY, "rgba(200,247,255,0.75)", 13);

          // Death message
          pxText(milestoneMsg ? milestoneMsg[1] : deathMsg, sx, statsY + 28, "rgba(200,247,255,0.90)", 15);

          // Streak / lifetime
          pxText(`Total runs: ${lifetime.runs}  |  Lifetime points: ${lifetime.totalScore}`, sx, statsY + 56, "rgba(200,247,255,0.55)", 12);

          // Retry prompt
          const blink = Math.sin(t * 5) > 0;
          if (blink) {
            pxText("Space or tap to try again!", sx, statsY + 84, "#c8f7ff", 16);
          }

        } else {
          // Ready state
          pxText("FLAPPY FISH", bx + 36, by + 26, "#c8f7ff", 34);
          pxText("Space or tap to swim", bx + 36, by + 78, "rgba(200,247,255,0.90)", 16);

          pxText("Powerups: S shield, T slow, M magnet, 2 double", bx + 36, by + 116, "rgba(200,247,255,0.72)", 13);
          pxText("Hug gates close for NEAR-MISS bonus points!", bx + 36, by + 138, "#ff6bd6", 13);
          pxText("Chain gates fast for COMBO multiplier!", bx + 36, by + 158, "#ffd36b", 13);
          pxText("Your fish evolves as you score higher!", bx + 36, by + 178, "#88ffb6", 13);

          if (lifetime.runs > 0) {
            pxText(`${lifetime.runs} runs played  |  Best: ${best}`, bx + 36, by + 204, "rgba(200,247,255,0.55)", 12);
          }
        }
      }

      function swim() {
        if (state === STATE.over) {
          // Quick restart from game over
          setState(STATE.ready);
          reset();
          setState(STATE.playing);
          FISH.vy = SWIM_V;
          run.swims = 1;
          beep(740, 0.05, "square", 0.03);
          return;
        }
        if (state === STATE.ready) {
          setState(STATE.playing);
          reset();
          beep(740, 0.05, "square", 0.03);
        }
        if (state === STATE.playing) {
          FISH.vy = SWIM_V;
          run.swims += 1;
          run.lastSwimTime = t;
          run.gatesSinceSwim = 0;
          beep(620, 0.04, "square", 0.025);
          unlockIfNeeded();
        }
      }

      function restart() {
        setState(STATE.ready);
        reset();
      }

      function toggleSound() {
        audioOn = !audioOn;
        btnMute.textContent = audioOn ? "Sound: On" : "Sound: Off";
        if (audioOn) beep(880, 0.05, "square", 0.03);
      }

      function toggleAchievementsPanel() {
        panel.classList.toggle("show");
        renderAchievementsList();
      }

      btnStart.addEventListener("click", () => swim());
      btnRestart.addEventListener("click", () => restart());
      btnMute.addEventListener("click", () => toggleSound());
      btnAch.addEventListener("click", () => toggleAchievementsPanel());
      panelClose.addEventListener("click", () => panel.classList.remove("show"));

      window.addEventListener("keydown", (e) => {
        const k = e.key.toLowerCase();
        if (k === " " || k === "arrowup" || k === "w") { e.preventDefault(); swim(); }
        if (k === "r") restart();
        if (k === "m") toggleSound();
        if (k === "a") toggleAchievementsPanel();
      }, { passive: false });

      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        swim();
      }, { passive: false });

      // Update loop
      function update(dt) {
        // Hit-freeze effect
        if (freezeTimer > 0) {
          freezeTimer -= dt;
          return;
        }

        t += dt;

        // Screen shake decay
        screenShake *= Math.max(0, 1 - dt * 12);
        if (screenShake < 0.3) screenShake = 0;

        // Screen flash decay
        screenFlashAlpha *= Math.max(0, 1 - dt * 6);

        // Combo timer
        if (comboTimer > 0) {
          comboTimer -= dt;
          if (comboTimer <= 0) {
            breakCombo();
          }
        }

        // Buff countdowns
        buffs.slowTime = Math.max(0, buffs.slowTime - dt);
        buffs.magnet = Math.max(0, buffs.magnet - dt);
        buffs.x2 = Math.max(0, buffs.x2 - dt);

        shieldEl.textContent = String(buffs.shieldCharges);

        // Floating texts
        for (let i = floatingTexts.length - 1; i >= 0; i--) {
          const ft = floatingTexts[i];
          ft.y += ft.vy * dt;
          ft.life -= dt;
          if (ft.life <= 0) floatingTexts.splice(i, 1);
        }

        // Particles
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          p.vy += 200 * dt; // gravity on particles
          p.life -= dt;
          if (p.life <= 0) particles.splice(i, 1);
        }

        // Bubbles drift always
        for (let i = bubbles.length - 1; i >= 0; i--) {
          const b = bubbles[i];

          if (state === STATE.playing && buffs.magnet > 0 && b.bonus) {
            const dx = FISH.x - b.x;
            const dy = FISH.y - b.y;
            const d = Math.max(40, Math.hypot(dx, dy));
            b.vx += (dx / d) * 55 * dt;
            b.vy += (dy / d) * 55 * dt;
          }

          b.x += b.vx * dt;
          b.y += b.vy * dt;
          b.life -= dt;
          b.vy -= 18 * dt;

          if (b.life <= 0 || b.y < -30) bubbles.splice(i, 1);
        }

        if (state !== STATE.playing) return;

        const baseSpeed = PIPE_SPEED_START + (t * (PIPE_SPEED_START * SPEED_RAMP));
        const speed = buffs.slowTime > 0 ? baseSpeed * 0.62 : baseSpeed;

        // Physics
        FISH.vy += GRAVITY * dt;
        FISH.y += FISH.vy * dt;

        // Powerups
        for (const p of powerups) {
          if (!p.alive) continue;
          p.x -= speed * dt;
          p.spin += dt * 6;

          if (p.x < -60) p.alive = false;

          if (fishCollectsCircle(p.x, p.y, p.r)) {
            p.alive = false;
            applyPowerup(p.kind);
            unlockIfNeeded();
          }
        }

        // Pipes
        for (const p of pipes) {
          p.x -= speed * dt;

          if (!p.passed && p.x + PIPE_W < FISH.x) {
            p.passed = true;

            run.gatesSinceSwim += 1;

            // Check near-miss
            let nearMiss = checkNearMiss(p);
            if (nearMiss && !p.nearMissed) {
              p.nearMissed = true;
              run.nearMisses++;
              lifetime.nearMisses++;
              spawnFloatingText(FISH.x + 40, FISH.y - 20, "CLOSE!", "#ff6bd6", 16);
              spawnExplosion(FISH.x, FISH.y, 6, ["#ff6bd6", "#ffd36b", "#7ee7ff"]);
              beep(1400, 0.03, "square", 0.02);
            }

            // Base score
            let add = 1;
            // Golden gate bonus
            if (p.golden) {
              add = 5;
              run.goldenGates++;
              spawnFloatingText(FISH.x + 40, FISH.y, "GOLDEN +5!", "#ffd36b", 20);
              flash("rgba(255,211,107,", 0.15);
              shake(4);
              beep(880, 0.08, "square", 0.025);
              setTimeout(() => beep(1100, 0.06, "square", 0.02), 60);
            }
            // Near miss bonus
            if (nearMiss) add += 1;
            // x2 buff
            if (buffs.x2 > 0) add *= 2;
            // Combo multiplier
            addCombo();
            add = Math.floor(add * getComboMultiplier());

            run.maxCombo = Math.max(run.maxCombo, comboCount);
            lifetime.bestCombo = Math.max(lifetime.bestCombo, comboCount);

            score += add;
            scoreEl.textContent = String(score);

            if (add > 1) {
              spawnFloatingText(FISH.x + 50, FISH.y + 10, `+${add}`, "#ffd36b", add >= 5 ? 22 : 16);
            }

            // Pitch rises with combo
            beep(880 + comboCount * 40, 0.04, "square", 0.02);

            // Milestone check
            if (MILESTONE_MSGS[score]) {
              showToast(`<b>${MILESTONE_MSGS[score]}</b>`, 2500);
              spawnExplosion(FISH.x, FISH.y, 15, ["#88ffb6", "#ffd36b", "#7ee7ff"]);
            }

            // "Approaching best" nudge
            if (best > 5 && score === best - 1) {
              showToast(`<b class="combo-toast">1 away from your best!</b>`, 1800);
            }

            unlockIfNeeded();
          }

          // Collision
          if (fishCollidesPipe(p)) {
            if (buffs.shieldCharges > 0) {
              buffs.shieldCharges -= 1;
              run.shieldSavedYou = true;

              FISH.vy = SWIM_V * 0.55;
              FISH.y = clamp(FISH.y, 40, GROUND_Y - 40);

              spawnBubbleBurst(FISH.x, true);
              spawnExplosion(FISH.x, FISH.y, 12, ["#88ffb6", "#7ee7ff"]);
              shake(6);
              flash("rgba(136,255,182,", 0.15);
              freezeTimer = 0.06;
              beep(220, 0.08, "square", 0.03);
              beep(520, 0.06, "square", 0.02);
              spawnFloatingText(FISH.x, FISH.y - 30, "SHIELD!", "#88ffb6", 18);

              unlockIfNeeded();
            } else {
              endGame();
              return;
            }
          }
        }

        // Recycle pipes
        while (pipes.length && pipes[0].x < -PIPE_W - 10) {
          pipes.shift();
          const lastX = pipes.length ? pipes[pipes.length - 1].x : W;
          spawnPipe(Math.max(lastX + PIPE_SPACING, W + 220));
        }

        // Bonus bubble collection
        for (let i = bubbles.length - 1; i >= 0; i--) {
          const b = bubbles[i];
          if (b.bonus && fishCollectsCircle(b.x, b.y, b.r)) {
            bubbles.splice(i, 1);

            run.bonusBubbles += 1;

            let add = buffs.x2 > 0 ? 4 : 2;
            add = Math.floor(add * getComboMultiplier());
            score += add;
            scoreEl.textContent = String(score);

            spawnFloatingText(b.x, b.y - 10, `+${add}`, "#7ee7ff", 14);

            beep(1200, 0.05, "square", 0.02);
            beep(1500, 0.04, "square", 0.015);

            unlockIfNeeded();
          }
        }

        // Ambient bubbles
        if (Math.random() < 0.06) {
          bubbles.push(makeBubble(
            W + 18,
            RNG(GROUND_Y - 120, GROUND_Y - 30),
            RNG(4, 10),
            false
          ));
        }

        // Bounds check
        if (FISH.y + FISH.r > GROUND_Y || FISH.y - FISH.r < 0) {
          if (buffs.shieldCharges > 0) {
            buffs.shieldCharges -= 1;
            run.shieldSavedYou = true;
            FISH.vy = SWIM_V * 0.55;
            FISH.y = clamp(FISH.y, 40, GROUND_Y - 40);
            shake(5);
            beep(220, 0.08, "square", 0.03);
            unlockIfNeeded();
          } else {
            endGame();
          }
        }
      }

      function endGame() {
        setState(STATE.over);

        // Epic death effects
        spawnExplosion(FISH.x, FISH.y, 30, ["#ff6b6b", "#ffd36b", "#ff6bd6", "#c8f7ff"]);
        spawnBubbleBurst(FISH.x, false);
        shake(12);
        flash("rgba(255,107,107,", 0.25);
        freezeTimer = 0.12; // dramatic pause

        beep(140, 0.12, "square", 0.03);
        setTimeout(() => beep(90, 0.16, "square", 0.03), 80);

        // Lifetime tracking
        lifetime.runs++;
        lifetime.totalScore += score;
        lifetime.totalGates += score;
        lifetime.deaths++;
        saveLifetime();

        // Best score
        if (score > best) {
          best = score;
          bestEl.textContent = String(best);
          try { localStorage.setItem("flappyFishBest", String(best)); } catch (e) {}
          if (score > 0) {
            showToast(`<b>NEW BEST: ${score}!</b>`, 3000);
            spawnExplosion(FISH.x, FISH.y, 40, ["#88ffb6", "#ffd36b", "#fff"]);
          }
        }

        // Final unlock pass
        unlockIfNeeded();
      }

      function render(dt) {
        ctx.save();

        // Screen shake
        if (screenShake > 0.5) {
          const sx = (Math.random() - 0.5) * screenShake * 2;
          const sy = (Math.random() - 0.5) * screenShake * 2;
          ctx.translate(sx, sy);
        }

        ctx.clearRect(-10, -10, W + 20, H + 20);

        const baseSpeed = PIPE_SPEED_START + (t * (PIPE_SPEED_START * SPEED_RAMP));
        const speed = buffs.slowTime > 0 ? baseSpeed * 0.62 : baseSpeed;

        drawBackground(dt, speed);

        for (const p of pipes) drawPipe(p);
        drawPowerups();
        drawBubbles();
        drawParticles();
        drawFish();
        drawFloatingTexts();
        drawComboBar();

        // Sparkle particles
        if (Math.random() < 0.09) {
          const x = RNG(0, W);
          const y = RNG(0, GROUND_Y - 30);
          ctx.globalAlpha = 0.22;
          pxRect(x, y, 2, 2, "rgba(200,247,255,1)");
          ctx.globalAlpha = 1;
        }

        // Speed lines when going fast
        if (state === STATE.playing && baseSpeed > 400) {
          const intensity = Math.min(0.15, (baseSpeed - 400) * 0.0003);
          ctx.globalAlpha = intensity;
          for (let i = 0; i < 4; i++) {
            const y = RNG(20, GROUND_Y - 20);
            pxRect(RNG(0, W * 0.7), y, RNG(30, 80), 2, "rgba(200,247,255,1)");
          }
          ctx.globalAlpha = 1;
        }

        // Screen flash
        if (screenFlashAlpha > 0.01) {
          ctx.globalAlpha = screenFlashAlpha;
          pxRect(0, 0, W, H, screenFlashColor + "1)");
          ctx.globalAlpha = 1;
        }

        // HUD on canvas
        pxText("Space/tap to swim", 14, 12, "rgba(200,247,255,0.50)", 12);

        // Active buff indicators on screen
        if (state === STATE.playing) {
          let bx = 14;
          const by = 30;
          if (buffs.slowTime > 0) { pxText(`SLOW ${buffs.slowTime.toFixed(1)}s`, bx, by, "#7ee7ff", 12); bx += 100; }
          if (buffs.magnet > 0) { pxText(`MAGNET ${buffs.magnet.toFixed(1)}s`, bx, by, "#ffd36b", 12); bx += 110; }
          if (buffs.x2 > 0) { pxText(`x2 ${buffs.x2.toFixed(1)}s`, bx, by, "#ff6b6b", 12); bx += 80; }
          if (buffs.shieldCharges > 0) { pxText(`SHIELD x${buffs.shieldCharges}`, bx, by, "#88ffb6", 12); }
        }

        drawOverlay();

        ctx.restore();
      }

      function loop(now) {
        const dt = Math.min(0.032, (now - last) / 1000);
        last = now;

        update(dt);
        render(dt);

        requestAnimationFrame(loop);
      }

      // Boot
      setState(STATE.ready);
      renderAchievementsList();
      reset();
      requestAnimationFrame(loop);
    })();
  </script>
</body>
