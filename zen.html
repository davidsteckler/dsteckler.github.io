<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stillness — A Daily Practice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #2a2825;
    --ink-soft: #5a544c;
    --paper: #f4ede0;
    --paper-warm: #ede2cc;
    --accent: #8b6f47;
    --enso: #2a2825;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100%; }

  body {
    font-family: 'Cormorant Garamond', 'Noto Serif JP', Georgia, serif;
    color: var(--ink);
    background:
      radial-gradient(ellipse at 30% 20%, #f7f0e3 0%, transparent 50%),
      radial-gradient(ellipse at 70% 80%, #e8dcc4 0%, transparent 50%),
      linear-gradient(180deg, #f4ede0 0%, #e8dcc4 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 1.5rem 5rem;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(139, 111, 71, 0.04) 1px, transparent 1px),
      radial-gradient(circle at 80% 70%, rgba(139, 111, 71, 0.03) 1px, transparent 1px);
    background-size: 50px 50px, 80px 80px;
    pointer-events: none;
    z-index: 0;
  }

  .stage {
    position: relative;
    z-index: 1;
    max-width: 680px;
    width: 100%;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.75rem;
  }

  .enso-wrap {
    position: relative;
    width: 180px;
    height: 180px;
    cursor: pointer;
    transition: transform 0.6s ease;
  }
  .enso-wrap:hover { transform: scale(1.02); }

  .enso { width: 100%; height: 100%; }

  .enso-path {
    fill: none;
    stroke: var(--enso);
    stroke-width: 6;
    stroke-linecap: round;
    stroke-dasharray: 540;
    stroke-dashoffset: 540;
    animation: draw-enso 3s ease-out forwards;
    opacity: 0.85;
  }

  @keyframes draw-enso { to { stroke-dashoffset: 0; } }

  .breath-circle {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(139, 111, 71, 0.15), transparent 70%);
    transform: scale(0.5);
    opacity: 0;
    transition: opacity 0.5s;
    pointer-events: none;
  }

  .breathing .breath-circle {
    opacity: 1;
    animation: breathe 11s ease-in-out infinite;
  }

  @keyframes breathe {
    0% { transform: scale(0.5); }
    36% { transform: scale(1.3); }
    64% { transform: scale(1.3); }
    100% { transform: scale(0.5); }
  }

  .breath-label {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Noto Serif JP', serif;
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    color: var(--ink-soft);
    text-transform: lowercase;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .breathing .breath-label { opacity: 1; }

  .quote-block {
    min-height: 200px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    transition: opacity 0.6s ease;
  }

  .quote-block.fading { opacity: 0; }

  .quote {
    font-size: clamp(1.4rem, 3vw, 1.9rem);
    font-style: italic;
    font-weight: 300;
    line-height: 1.5;
    color: var(--ink);
    letter-spacing: 0.01em;
  }

  .quote::before, .quote::after {
    content: '';
    display: block;
    width: 40px;
    height: 1px;
    background: var(--accent);
    margin: 1rem auto;
    opacity: 0.5;
  }

  .attribution {
    font-size: 0.85rem;
    letter-spacing: 0.15em;
    color: var(--ink-soft);
    text-transform: uppercase;
    font-style: normal;
    margin-top: 0.4rem;
  }

  .tradition-tag {
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    color: var(--accent);
    text-transform: uppercase;
    margin-top: 0.6rem;
    opacity: 0.8;
  }

  .learn-more {
    display: inline-block;
    margin-top: 0.5rem;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: var(--ink-soft);
    text-decoration: none;
    text-transform: lowercase;
    border-bottom: 1px dotted rgba(139, 111, 71, 0.4);
    padding-bottom: 1px;
    transition: all 0.3s;
    opacity: 0;
    transform: translateY(-4px);
  }

  .learn-more.shown {
    opacity: 0.85;
    transform: translateY(0);
  }

  .learn-more:hover {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .learn-more::before {
    content: '↗ ';
    font-size: 0.85em;
    margin-right: 0.2em;
  }

  .reflection {
    font-size: 1rem;
    color: var(--ink-soft);
    line-height: 1.7;
    margin-top: 1.5rem;
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    transition: max-height 0.8s ease, opacity 0.8s ease;
    font-style: italic;
    padding: 0 1rem;
  }

  .reflection.shown {
    max-height: 400px;
    opacity: 1;
  }

  /* Filter section with two rows */
  .filters {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    width: 100%;
    align-items: center;
  }

  .filter-label {
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    color: var(--ink-soft);
    text-transform: uppercase;
    opacity: 0.6;
  }

  .filter-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.4rem;
    max-width: 100%;
  }

  .pill {
    background: transparent;
    border: 1px solid rgba(139, 111, 71, 0.3);
    color: var(--ink-soft);
    padding: 0.35rem 0.8rem;
    font-family: inherit;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    border-radius: 20px;
    transition: all 0.3s;
    text-transform: lowercase;
  }

  .pill:hover {
    background: rgba(139, 111, 71, 0.08);
    border-color: var(--accent);
  }

  .pill.active {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }

  .actions {
    display: flex;
    gap: 1.5rem;
    margin-top: 0.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .action {
    background: transparent;
    border: none;
    color: var(--ink-soft);
    font-family: inherit;
    font-size: 0.85rem;
    letter-spacing: 0.15em;
    text-transform: lowercase;
    cursor: pointer;
    padding: 0.6rem 0.2rem;
    position: relative;
    transition: color 0.3s;
  }

  .action::after {
    content: '';
    position: absolute;
    bottom: 4px; left: 50%;
    width: 0; height: 1px;
    background: var(--accent);
    transition: all 0.3s;
    transform: translateX(-50%);
  }

  .action:hover { color: var(--ink); }
  .action:hover::after { width: 100%; }
  .action.active { color: var(--accent); }
  .action.active::after { width: 100%; }
  .action:disabled { opacity: 0.5; cursor: wait; }

  /* Drift button — the prominent "show me another" */
  .drift {
    background: transparent;
    border: 1px solid var(--ink);
    color: var(--ink);
    padding: 0.7rem 2rem;
    font-family: inherit;
    font-size: 0.85rem;
    letter-spacing: 0.35em;
    text-transform: lowercase;
    cursor: pointer;
    border-radius: 999px;
    transition: all 0.4s ease;
    margin-top: 0.5rem;
    display: inline-flex;
    align-items: center;
    gap: 0.7rem;
    position: relative;
    overflow: hidden;
  }

  .drift::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.6;
    transition: transform 0.6s ease;
  }

  .drift:hover {
    background: var(--ink);
    color: var(--paper);
    letter-spacing: 0.4em;
  }

  .drift:hover::before {
    transform: translateX(8px) translateY(-2px);
    background: var(--paper);
  }

  .drift:active { transform: scale(0.98); }

  .stats {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--ink-soft);
    opacity: 0.5;
    text-transform: uppercase;
    margin-top: 0.3rem;
  }

  .chime-pulse {
    position: fixed;
    top: 50%; left: 50%;
    width: 20px; height: 20px;
    border: 2px solid var(--accent);
    border-radius: 50%;
    transform: translate(-50%, -50%) scale(0);
    pointer-events: none;
    opacity: 0;
  }

  .chime-pulse.ring { animation: chime-ring 2s ease-out; }

  @keyframes chime-ring {
    0% { transform: translate(-50%, -50%) scale(0); opacity: 0.6; }
    100% { transform: translate(-50%, -50%) scale(40); opacity: 0; }
  }

  .foot {
    position: absolute;
    bottom: 1.2rem;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    color: var(--ink-soft);
    opacity: 0.5;
    text-transform: uppercase;
  }

  .date-stamp {
    font-family: 'Noto Serif JP', serif;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    color: var(--ink-soft);
    opacity: 0.7;
  }

  @media (max-width: 480px) {
    .enso-wrap { width: 140px; height: 140px; }
    .stage { gap: 1.25rem; }
    .actions { gap: 1rem; }
    .action { font-size: 0.75rem; }
    .pill { font-size: 0.7rem; padding: 0.3rem 0.65rem; }
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="date-stamp" id="dateStamp"></div>

    <div class="enso-wrap" id="ensoWrap" title="Tap to breathe">
      <svg class="enso" viewBox="0 0 200 200">
        <path class="enso-path" d="M 100 20
          C 145 22, 178 55, 178 100
          C 178 145, 145 178, 100 178
          C 55 178, 22 145, 22 100
          C 22 58, 50 28, 88 22" />
      </svg>
      <div class="breath-circle"></div>
      <div class="breath-label" id="breathLabel">breathe in</div>
    </div>

    <div class="quote-block" id="quoteBlock">
      <div class="quote" id="quote">…</div>
      <div class="attribution" id="attribution"></div>
      <div class="tradition-tag" id="traditionTag"></div>
      <a class="learn-more" id="learnMore" target="_blank" rel="noopener noreferrer">learn more</a>
      <div class="reflection" id="reflection"></div>
    </div>

    <button class="drift" id="driftBtn">drift</button>

    <div class="filters">
      <div class="filter-label">tradition</div>
      <div class="filter-row" id="traditionRow"></div>
      <div class="filter-label">theme</div>
      <div class="filter-row" id="themeRow"></div>
    </div>

    <div class="actions">
      <button class="action" id="newQuote">summon</button>
      <button class="action" id="reflectBtn">sit with this</button>
      <button class="action" id="breatheBtn">breathe</button>
      <button class="action" id="chimeBtn">chime</button>
    </div>

    <div class="stats" id="stats"></div>
  </div>

  <div class="chime-pulse" id="chimePulse"></div>
  <div class="foot">stillness · 静けさ · سكون · शान्ति</div>

<script>
/* ============================================================
 * GLOBAL WISDOM CORPUS
 * Each entry: { q, a, t, themes }
 *   q = quote
 *   a = attributed source (specific where possible)
 *   t = tradition (used by tradition filter)
 *   themes = array of themes (used by theme filter)
 *
 * Sources span Buddhist (Zen, Theravada, Tibetan, Mahayana),
 * Taoist, Hindu/Vedantic, Sufi/Islamic, Christian contemplative,
 * Jewish (Hasidic, Talmudic), Stoic, African, Indigenous,
 * Confucian, Shinto, and contemporary cross-tradition teachers.
 *
 * Curated for confident attribution. Common phrases are tagged
 * generically (e.g. "Zen Proverb", "Sufi Saying") rather than
 * invented attributions.
 * ============================================================ */
const CORPUS = [
  // --- ZEN BUDDHIST ---
  { q: "When walking, walk. When eating, eat.", a: "Zen Proverb", t: "zen", themes: ["presence"] },
  { q: "Before enlightenment, chop wood, carry water. After enlightenment, chop wood, carry water.", a: "Zen Proverb", t: "zen", themes: ["presence", "ordinary"] },
  { q: "The obstacle is the path.", a: "Zen Proverb", t: "zen", themes: ["acceptance"] },
  { q: "Knock on the sky and listen to the sound.", a: "Zen Proverb", t: "zen", themes: ["koan"] },
  { q: "No snowflake ever falls in the wrong place.", a: "Zen Proverb", t: "zen", themes: ["impermanence", "acceptance"] },
  { q: "Let go, or be dragged.", a: "Zen Proverb", t: "zen", themes: ["acceptance"] },
  { q: "Sitting quietly, doing nothing, spring comes, and the grass grows by itself.", a: "Zenrin Kushū", t: "zen", themes: ["presence", "ordinary"] },
  { q: "If you understand, things are just as they are. If you do not understand, things are just as they are.", a: "Zen Proverb", t: "zen", themes: ["acceptance", "emptiness"] },
  { q: "What is the sound of one hand clapping?", a: "Hakuin Ekaku", t: "zen", themes: ["koan"] },
  { q: "Show me your original face — the face you had before your parents were born.", a: "Zen Koan", t: "zen", themes: ["koan"] },
  { q: "If you meet the Buddha on the road, kill him.", a: "Linji Yixuan", t: "zen", themes: ["koan", "emptiness"] },
  { q: "Does a dog have Buddha-nature? Mu.", a: "Zhaozhou's Mu", t: "zen", themes: ["koan"] },
  { q: "The mind that does not understand is the Buddha. There is no other.", a: "Mazu Daoyi", t: "zen", themes: ["emptiness"] },
  { q: "Not knowing is most intimate.", a: "Dizang Guichen", t: "zen", themes: ["emptiness"] },
  { q: "When you reach the top of the mountain, keep climbing.", a: "Zen Proverb", t: "zen", themes: ["practice"] },
  { q: "The bird does not sing because it has an answer. It sings because it has a song.", a: "Chinese Proverb", t: "zen", themes: ["ordinary", "presence"] },
  { q: "Fall down seven times, get up eight.", a: "Japanese Proverb", t: "zen", themes: ["practice", "courage"] },
  { q: "Quiet mind, holy mind.", a: "Zen Saying", t: "zen", themes: ["presence"] },

  // --- DOGEN ---
  { q: "To study the Way is to study the self. To study the self is to forget the self.", a: "Dōgen, Genjōkōan", t: "zen", themes: ["practice", "emptiness"] },
  { q: "If you cannot find the truth right where you are, where else do you expect to find it?", a: "Dōgen", t: "zen", themes: ["presence"] },
  { q: "Time itself is being, and all being is time.", a: "Dōgen, Uji", t: "zen", themes: ["impermanence"] },
  { q: "Practice and enlightenment are one.", a: "Dōgen", t: "zen", themes: ["practice"] },
  { q: "A flower falls, even though we love it; and a weed grows, even though we do not love it.", a: "Dōgen", t: "zen", themes: ["impermanence", "acceptance"] },

  // --- SHUNRYU SUZUKI ---
  { q: "In the beginner's mind there are many possibilities, but in the expert's there are few.", a: "Shunryu Suzuki", t: "zen", themes: ["practice", "emptiness"] },

  // --- BUDDHIST (BROADER) ---
  { q: "All conditioned things are impermanent. Work out your salvation with diligence.", a: "Buddha's last words", t: "buddhist", themes: ["impermanence", "practice"] },

function learnMoreUrl(attribution) {
  if (!attribution) return null;
  const a = attribution.trim();
  const lower = a.toLowerCase();

  // Skip pure generic attributions like "Zen Proverb", "African Proverb"
  const purelyGeneric = /^(zen|sufi|hasidic|hadith|christian|jewish|buddhist|hindu|taoist|stoic|chinese|japanese|korean|vietnamese|persian|irish|hawaiian|maori|tibetan|aboriginal|native american|cherokee|kiowa|arapaho|hopi|sioux|pueblo|comanche|anishinaabe|tuscarora|crow|lakota|akan|yoruba|igbo|bambara|swahili|bantu|guinean|nigerian|ethiopian|cameroonian|ugandan|kenyan|tswana|polynesian|celtic|african|indigenous|modern|contemporary|vedantic|talmudic|talmud|hadith|vedic|shawnee|iroquois|cree|blackfoot|metta|mishnah|bantu)\s+(proverb|saying|blessing|teaching|tradition|principle|chief|elder|saying)s?$/i;
  if (purelyGeneric.test(a)) return null;

  // Skip anonymous/paraphrased attributions
  if (/paraphrased|anonymous|attributed|inscribed|often quoted/i.test(a)) {
    // unless there's a specific name we can extract
    const namedMatch = a.match(/^([A-Z][a-zà-ÿ\u0080-\uFFFF]+(?:\s+[A-Z][a-zà-ÿ\u0080-\uFFFF]+)+)/);
    if (!namedMatch) return null;
  }

  // Strip trailing source after comma: "Dōgen, Genjōkōan" → "Dōgen"
  // But preserve textual references like "Pirkei Avot 4:1" or "Matthew 6:28"
  let primary = a;
  if (a.includes(',') && !/\d/.test(a.split(',')[1] || '')) {
    primary = a.split(',')[0].trim();
  }

  // Strip trailing parenthetical: "Akan Proverb (Ghana)" → "Akan Proverb"
  primary = primary.replace(/\s*\([^)]*\)\s*$/, '').trim();

  // Strip "/ X" disjunction — pick the first attributed name
  if (primary.includes('/')) {
    primary = primary.split('/')[0].trim();
  }

  // Strip generic honorifics — but preserve them when the rest is just one name
  // (e.g., "Chief Seattle" should stay as "Chief Seattle" since "Seattle" alone is ambiguous)
  const namedTitle = /^(Rabbi|Sri|Swami|Saint|St\.|Master|Sister|Brother|Mother|Father)\s+/i;
  if (namedTitle.test(primary)) {
    const stripped = primary.replace(namedTitle, '');
    // Only strip if what remains is two or more words (a fuller name)
    if (stripped.split(/\s+/).length >= 2) primary = stripped;
  }

  // Re-check generic after stripping
  if (purelyGeneric.test(primary)) return null;

  // Apply overrides for known specific page mismatches
  for (const [key, slug] of Object.entries(ATTRIBUTION_OVERRIDES)) {
    if (primary.toLowerCase().includes(key.toLowerCase())) {
      return `https://en.wikipedia.org/wiki/${slug}`;
    }
  }

  // Biblical/scripture references
  const bibleMatch = primary.match(/^(Matthew|Mark|Luke|John|Psalm|Genesis|Exodus)\s/i);
  if (bibleMatch) {
    const book = bibleMatch[1];
    const slug = book.toLowerCase() === 'psalm' ? 'Psalms'
               : `Gospel_of_${book.charAt(0).toUpperCase() + book.slice(1).toLowerCase()}`;
    return `https://en.wikipedia.org/wiki/${slug}`;
  }

  // Pirkei Avot citations
  if (/^Pirkei Avot/i.test(primary)) {
    return 'https://en.wikipedia.org/wiki/Pirkei_Avot';
  }

  // Default: Wikipedia search-redirect on the cleaned attribution
  return `https://en.wikipedia.org/wiki/Special:Search?search=${encodeURIComponent(primary)}&go=Go`;
}

  const allT = mkPill('all', 'all', true);
  allT.dataset.kind = 'tradition';
  tRow.appendChild(allT);
  Object.entries(TRADITION_GROUPS).forEach(([key, info]) => {

    p.dataset.kind = 'tradition';
    tRow.appendChild(p);

      const kind = btn.dataset.kind;
      document.querySelectorAll(`.pill[data-kind="${kind}"]`).forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (kind === 'tradition') currentTradition = btn.dataset.value;
      else currentTheme = btn.dataset.value;
      seenInSession.clear();
      renderQuote(pickQuote());
    });
  });
}

function mkPill(label, value, active) {
  const b = document.createElement('button');
  b.className = 'pill' + (active ? ' active' : '');
  b.textContent = label;
  b.dataset.value = value;
  return b;
}

// ============================================================
// QUOTE SELECTION
// ============================================================
function filteredPool() {
  return CORPUS.filter(c => {
    const traditionMatch =
      currentTradition === 'all' ||
      (TRADITION_GROUPS[currentTradition] &&
       TRADITION_GROUPS[currentTradition].traditions.includes(c.t));
    const themeMatch =
      currentTheme === 'all' || c.themes.includes(currentTheme);
    return traditionMatch && themeMatch;
  });
}

function pickQuote() {
  const pool = filteredPool();
  if (!pool.length) return CORPUS[0];

  // Avoid recently-seen quotes within a session
  const fresh = pool.filter(p => !seenInSession.has(p.q));
  const choosable = fresh.length ? fresh : pool;
  const pick = choosable[Math.floor(Math.random() * choosable.length)];
  seenInSession.add(pick.q);
  // Reset session memory if we've seen most of the pool
  if (seenInSession.size > pool.length * 0.7) seenInSession.clear();
  return pick;
}

function renderQuote(item) {
  const block = document.getElementById('quoteBlock');
  block.classList.add('fading');
  setTimeout(() => {
    document.getElementById('quote').textContent = `"${item.q}"`;
    document.getElementById('attribution').textContent = `— ${item.a}`;
    document.getElementById('traditionTag').textContent = item.t;

    // Set up learn-more link
    const link = document.getElementById('learnMore');
    const url = learnMoreUrl(item.a);
    if (url) {
      link.href = url;
      link.classList.add('shown');
    } else {
      link.removeAttribute('href');
      link.classList.remove('shown');
    }

    const r = document.getElementById('reflection');
    r.classList.remove('shown');
    r.textContent = '';
    document.getElementById('reflectBtn').classList.remove('active');
    block.classList.remove('fading');
    currentQuote = item;
  }, 400);
}

// ============================================================
// CLAUDE API — fresh contemplation
// ============================================================
async function generateFreshQuote() {
  let traditionStr;
  if (currentTradition === 'all') {
    traditionStr = 'any wisdom tradition (Zen, Sufi, Hasidic, Christian contemplative, Stoic, Taoist, Hindu, African, Indigenous, etc.)';
  } else {
    const group = TRADITION_GROUPS[currentTradition];
    traditionStr = `the ${group.label} contemplative traditions (such as ${group.traditions.join(', ')})`;
  }
  const themeStr = currentTheme === 'all' ? 'any contemplative theme' : `the theme of ${currentTheme}`;
  const fallbackTradition = currentTradition === 'all' ? 'modern' :
    (TRADITION_GROUPS[currentTradition].traditions[0]);

  const prompt = `Offer ONE authentic contemplative saying from ${traditionStr}, on ${themeStr}. It should be either a real well-known saying from that tradition, or — only if you cannot recall a real one — composed faithfully in that tradition's voice and labeled honestly. Keep it under 30 words. Respond ONLY with valid JSON, no other text:
{"q": "the saying", "a": "specific source if known (real teacher, text), or generic tradition label if newly composed", "t": "${fallbackTradition}", "themes": ["one-or-two-relevant-themes"]}`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 250,
        messages: [{ role: "user", content: prompt }]
      })
    });
    const data = await res.json();
    const text = data.content.map(b => b.type === 'text' ? b.text : '').join('').trim();
    const cleaned = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(cleaned);
    if (parsed.q && parsed.a) return parsed;
  } catch (e) {
    console.warn('Falling back to corpus:', e);
  }
  return pickQuote();
}

// ============================================================
// CLAUDE API — reflection
// ============================================================
async function generateReflection(item) {
  const prompt = `A practitioner is sitting with this contemplation:
"${item.q}" — ${item.a} (${item.t} tradition)

Write a brief, gentle reflection (2-3 sentences, under 60 words) that helps them sit with this teaching today. Speak softly, like a teacher offering a quiet pointer. Respect the tradition the saying comes from. No preamble, no headers, no quotes — just the reflection itself.`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 200,
        messages: [{ role: "user", content: prompt }]
      })
    });
    const data = await res.json();
    return data.content.map(b => b.type === 'text' ? b.text : '').join('').trim();
  } catch (e) {
    return "Sit. Breathe. Let the words settle without grasping at meaning. The teaching unfolds in stillness, not in thought.";
  }
}

// ============================================================
// BREATHING
// ============================================================
function toggleBreathing() {
  breathingActive = !breathingActive;
  const wrap = document.getElementById('ensoWrap');
  const btn = document.getElementById('breatheBtn');
  const label = document.getElementById('breathLabel');

  if (breathingActive) {
    wrap.classList.add('breathing');
    btn.classList.add('active');
    btn.textContent = 'stop breathing';
    const cycle = () => {
      label.textContent = 'breathe in';
      setTimeout(() => { if (breathingActive) label.textContent = 'hold'; }, 4000);
      setTimeout(() => { if (breathingActive) label.textContent = 'breathe out'; }, 7000);
    };
    cycle();
    breathInterval = setInterval(cycle, 11000);
  } else {
    wrap.classList.remove('breathing');
    btn.classList.remove('active');
    btn.textContent = 'breathe';
    clearInterval(breathInterval);
  }
}

// ============================================================
// CHIME
// ============================================================
function playChime() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const ctx = audioCtx;
  const now = ctx.currentTime;
  const fundamental = 220;
  const partials = [1, 2.76, 5.4, 8.93];
  const gains = [0.5, 0.3, 0.15, 0.08];

  partials.forEach((p, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = fundamental * p;
    osc.detune.value = (Math.random() - 0.5) * 4;
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(gains[i], now + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 5 + i * 0.5);
    osc.connect(gain).connect(ctx.destination);
    osc.start(now);
    osc.stop(now + 6);
  });

  const pulse = document.getElementById('chimePulse');
  pulse.classList.remove('ring');
  void pulse.offsetWidth;
  pulse.classList.add('ring');
}

// ============================================================
// INIT
// ============================================================
function setDateStamp() {
  const d = new Date();
  document.getElementById('dateStamp').textContent =
    d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' }).toLowerCase();
}

function setStats() {
  const tradCount = new Set(CORPUS.map(c => c.t)).size;
  document.getElementById('stats').textContent =
    `${CORPUS.length} sayings · ${tradCount} traditions · infinite reflection`;
}

function initialQuote() {
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 0);
  const dayOfYear = Math.floor((now - start) / (1000 * 60 * 60 * 24));
  return CORPUS[dayOfYear % CORPUS.length];
}

document.getElementById('newQuote').addEventListener('click', async () => {
  const btn = document.getElementById('newQuote');
  btn.textContent = 'arriving...';
  btn.disabled = true;
  const fresh = await generateFreshQuote();
  renderQuote(fresh);
  btn.textContent = 'new wisdom';
  btn.disabled = false;
});

document.getElementById('reflectBtn').addEventListener('click', async () => {
  const r = document.getElementById('reflection');
  const btn = document.getElementById('reflectBtn');
  if (r.classList.contains('shown')) {
    r.classList.remove('shown');
    btn.classList.remove('active');
    return;
  }
  btn.classList.add('active');
  r.classList.add('shown');
  r.textContent = 'sitting...';
  const reflection = await generateReflection(currentQuote);
  r.textContent = reflection;
});

document.getElementById('breatheBtn').addEventListener('click', toggleBreathing);
document.getElementById('ensoWrap').addEventListener('click', toggleBreathing);
document.getElementById('chimeBtn').addEventListener('click', playChime);
document.getElementById('driftBtn').addEventListener('click', () => {
  renderQuote(pickQuote());
});

setDateStamp();
populateFilters();
setStats();
setTimeout(() => renderQuote(initialQuote()), 600);
</script>
